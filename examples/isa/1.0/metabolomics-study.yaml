# ISA v1.0 Example: Arabidopsis Metabolomics Study
# A complete example demonstrating ISA entity types with proper nesting

identifier: ISA-2024-ARAB-001
title: Metabolomic profiling of Arabidopsis thaliana under cold stress
description: >
  Investigation of metabolic changes in Arabidopsis thaliana Col-0 and
  cold-tolerant accessions during cold acclimation using LC-MS based
  untargeted metabolomics.
submission_date: "2024-02-20"
public_release_date: "2025-02-20"

contacts:
  - last_name: Johnson
    first_name: Emily
    mid_initials: R
    email: e.johnson@biolab.edu
    phone: "+1-555-123-4567"
    affiliation: Department of Plant Biology
    address: 123 Science Drive, Boston, MA 02115
    roles:
      - principal investigator
      - submitter
  - last_name: Chen
    first_name: Wei
    email: w.chen@biolab.edu
    affiliation: Department of Plant Biology
    roles:
      - laboratory technician

publications:
  - pubmed_id: "12345678"
    doi: "10.1234/plant.metab.2024.001"
    author_list: "Johnson ER, Chen W, Smith JK"
    title: Cold-induced metabolic reprogramming in Arabidopsis thaliana
    status: published

ontology_source_references:
  - name: EFO
    file: http://www.ebi.ac.uk/efo/efo.owl
    version: "3.50.0"
    description: Experimental Factor Ontology
  - name: PO
    file: http://purl.obolibrary.org/obo/po.owl
    version: "2023-06-22"
    description: Plant Ontology
  - name: CHEBI
    file: http://purl.obolibrary.org/obo/chebi.owl
    version: "230"
    description: Chemical Entities of Biological Interest

studies:
  - identifier: STU-ARAB-COLD-01
    investigation_id: ISA-2024-ARAB-001
    title: Cold acclimation time course in Arabidopsis
    description: >
      Time course experiment tracking metabolic changes during 7 days of
      cold acclimation at 4C compared to control conditions at 22C.
    submission_date: "2024-02-20"
    public_release_date: "2024-08-01"
    filename: s_cold_acclimation.txt

    protocols:
      - study_id: STU-ARAB-COLD-01
        name: Plant growth protocol
        protocol_type: growth protocol
        description: >
          Arabidopsis seeds surface sterilized and stratified at 4C for 3 days.
          Plants grown on 1/2 MS medium in growth chambers at 22C, 16h/8h light/dark.
        uri: https://protocols.io/view/arabidopsis-growth-123
        version: "1.0"

      - study_id: STU-ARAB-COLD-01
        name: Cold treatment protocol
        protocol_type: treatment protocol
        description: >
          Three-week-old plants transferred to 4C growth chamber. Control plants
          remained at 22C. Samples collected at 0h, 24h, and 7d after transfer.
        version: "1.0"

      - study_id: STU-ARAB-COLD-01
        name: Metabolite extraction protocol
        protocol_type: extraction
        description: >
          Frozen tissue (100mg) extracted with 1ml methanol:water (80:20).
          Samples homogenized, centrifuged 14000g 10min at 4C.
        version: "1.0"

      - study_id: STU-ARAB-COLD-01
        name: LC-MS analysis protocol
        protocol_type: mass spectrometry
        description: >
          Untargeted metabolomics using Thermo Q Exactive Plus. HILIC column.
          Full scan MS1 70000 resolution, data-dependent MS2 17500 resolution.
        version: "1.0"

    factors:
      - study_id: STU-ARAB-COLD-01
        name: Temperature
        factor_type: environmental factor

      - study_id: STU-ARAB-COLD-01
        name: Time point
        factor_type: temporal factor

    sources:
      - study_id: STU-ARAB-COLD-01
        name: Arabidopsis_Col0_seeds
        characteristics:
          - category: Organism
            value: Arabidopsis thaliana
          - category: Ecotype
            value: Columbia-0
          - category: Seed source
            value: NASC N1092

      - study_id: STU-ARAB-COLD-01
        name: Arabidopsis_ICE1_seeds
        characteristics:
          - category: Organism
            value: Arabidopsis thaliana
          - category: Genotype
            value: 35S::ICE1 overexpressor

    # Per ISA-JSON spec: All samples MUST be declared at Study level
    samples:
      - study_id: STU-ARAB-COLD-01
        name: Col0_Control_0h_Rep1
        derives_from:
          - name: Arabidopsis_Col0_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Control 22C
          - category: Time point
            value: 0 hours
          - category: Replicate
            value: "1"

      - study_id: STU-ARAB-COLD-01
        name: Col0_Control_0h_Rep2
        derives_from:
          - name: Arabidopsis_Col0_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Control 22C
          - category: Time point
            value: 0 hours
          - category: Replicate
            value: "2"

      - study_id: STU-ARAB-COLD-01
        name: Col0_Cold_24h_Rep1
        derives_from:
          - name: Arabidopsis_Col0_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Cold 4C
          - category: Time point
            value: 24 hours
          - category: Replicate
            value: "1"

      - study_id: STU-ARAB-COLD-01
        name: Col0_Cold_24h_Rep2
        derives_from:
          - name: Arabidopsis_Col0_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Cold 4C
          - category: Time point
            value: 24 hours
          - category: Replicate
            value: "2"

      - study_id: STU-ARAB-COLD-01
        name: Col0_Cold_7d_Rep1
        derives_from:
          - name: Arabidopsis_Col0_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Cold 4C
          - category: Time point
            value: 7 days
          - category: Replicate
            value: "1"

      - study_id: STU-ARAB-COLD-01
        name: ICE1_Cold_24h_Rep1
        derives_from:
          - name: Arabidopsis_ICE1_seeds
            study_id: STU-ARAB-COLD-01
        characteristics:
          - category: Treatment
            value: Cold 4C
          - category: Time point
            value: 24 hours
          - category: Genotype
            value: ICE1 overexpressor

    # Process sequence links sources to samples via protocol execution
    # Per ISA-JSON: inputs/outputs are references to materials declared above
    process_sequence:
      - name: sample_collection_Col0_0h_Rep1
        executes_protocol:
          name: Plant growth protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_Col0_seeds
        outputs:
          - Col0_Control_0h_Rep1

      - name: sample_collection_Col0_0h_Rep2
        executes_protocol:
          name: Plant growth protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_Col0_seeds
        outputs:
          - Col0_Control_0h_Rep2

      - name: sample_collection_Col0_24h_Rep1
        executes_protocol:
          name: Cold treatment protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_Col0_seeds
        outputs:
          - Col0_Cold_24h_Rep1

      - name: sample_collection_Col0_24h_Rep2
        executes_protocol:
          name: Cold treatment protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_Col0_seeds
        outputs:
          - Col0_Cold_24h_Rep2

      - name: sample_collection_Col0_7d_Rep1
        executes_protocol:
          name: Cold treatment protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_Col0_seeds
        outputs:
          - Col0_Cold_7d_Rep1

      - name: sample_collection_ICE1_24h_Rep1
        executes_protocol:
          name: Cold treatment protocol
          study_id: STU-ARAB-COLD-01
        inputs:
          - Arabidopsis_ICE1_seeds
        outputs:
          - ICE1_Cold_24h_Rep1

    assays:
      - study_id: STU-ARAB-COLD-01
        filename: a_metabolome_lcms_pos.txt
        measurement_type: metabolite profiling
        technology_type: mass spectrometry
        technology_platform: Thermo Q Exactive Plus
        # Assay references samples declared at Study level
        samples:
          - name: Col0_Control_0h_Rep1
            study_id: STU-ARAB-COLD-01
          - name: Col0_Control_0h_Rep2
            study_id: STU-ARAB-COLD-01
          - name: Col0_Cold_24h_Rep1
            study_id: STU-ARAB-COLD-01
          - name: Col0_Cold_7d_Rep1
            study_id: STU-ARAB-COLD-01
        data_files:
          - assay_id: a_metabolome_lcms_pos
            filename: Col0_Control_0h_Rep1_pos.raw
            label: Raw Data File
          - assay_id: a_metabolome_lcms_pos
            filename: Col0_Control_0h_Rep2_pos.raw
            label: Raw Data File
          - assay_id: a_metabolome_lcms_pos
            filename: Col0_Cold_24h_Rep1_pos.raw
            label: Raw Data File
          - assay_id: a_metabolome_lcms_pos
            filename: processed_pos_mode.mzML
            label: Derived Spectral Data File

      - study_id: STU-ARAB-COLD-01
        filename: a_metabolome_lcms_neg.txt
        measurement_type: metabolite profiling
        technology_type: mass spectrometry
        technology_platform: Thermo Q Exactive Plus
        samples:
          - name: Col0_Control_0h_Rep1
            study_id: STU-ARAB-COLD-01
          - name: Col0_Cold_24h_Rep2
            study_id: STU-ARAB-COLD-01
        data_files:
          - assay_id: a_metabolome_lcms_neg
            filename: Col0_Control_0h_Rep1_neg.raw
            label: Raw Data File
          - assay_id: a_metabolome_lcms_neg
            filename: processed_neg_mode.mzML
            label: Derived Spectral Data File
