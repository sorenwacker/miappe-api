studies:
  - identifier: STU-ARAB-COLD-01
    investigation_id: ISA-2024-ARAB-001
    title: Cold acclimation time course in Arabidopsis
    description: >
      Time course experiment tracking metabolic changes during 7 days of
      cold acclimation at 4C compared to control conditions at 22C.
    submission_date: "2024-02-20"
    public_release_date: "2024-08-01"
    filename: s_cold_acclimation.txt

    contacts:
      - study_id: STU-ARAB-COLD-01
        last_name: Chen
        first_name: Wei
        email: w.chen@biolab.edu
        affiliation: Department of Plant Biology
        roles:
          - laboratory technician

    protocols:
      - study_id: STU-ARAB-COLD-01
        name: Plant growth protocol
        protocol_type: growth protocol
        description: >
          Arabidopsis seeds were surface sterilized and stratified at 4C for 3 days.
          Plants were grown on 1/2 MS medium in growth chambers at 22C, 16h light/8h dark,
          100 umol/m2/s for 3 weeks before treatment.
        uri: https://protocols.io/view/arabidopsis-growth-protocol-123
        version: "1.0"
        parameters:
          - name: temperature
            parameter_name: growth temperature
          - name: light_intensity
            parameter_name: light intensity

      - study_id: STU-ARAB-COLD-01
        name: Cold treatment protocol
        protocol_type: treatment protocol
        description: >
          Three-week-old plants were transferred to 4C growth chamber with same light
          conditions. Control plants remained at 22C. Samples collected at 0h, 6h, 24h,
          3d, and 7d after transfer.
        version: "1.0"
        parameters:
          - name: treatment_temperature
            parameter_name: treatment temperature
          - name: treatment_duration
            parameter_name: treatment duration

      - study_id: STU-ARAB-COLD-01
        name: Sample collection protocol
        protocol_type: sample collection
        description: >
          Rosette leaves were harvested, immediately frozen in liquid nitrogen,
          and stored at -80C. Three biological replicates per condition per time point.
        version: "1.0"

      - study_id: STU-ARAB-COLD-01
        name: Metabolite extraction protocol
        protocol_type: extraction
        description: >
          Frozen tissue (100mg) was extracted with 1ml methanol:water (80:20 v/v)
          containing internal standards. Samples were homogenized, centrifuged at
          14000g for 10 min at 4C, and supernatant collected.
        version: "1.0"
        parameters:
          - name: solvent_ratio
            parameter_name: extraction solvent ratio
          - name: sample_mass
            parameter_name: sample mass

      - study_id: STU-ARAB-COLD-01
        name: LC-MS analysis protocol
        protocol_type: mass spectrometry
        description: >
          Untargeted metabolomics using Thermo Q Exactive Plus. HILIC chromatography
          with Waters BEH Amide column. Full scan MS1 at 70000 resolution, data-dependent
          MS2 at 17500 resolution.
        version: "1.0"
        parameters:
          - name: ionization_mode
            parameter_name: ionization mode
          - name: scan_range
            parameter_name: mass scan range

      - study_id: STU-ARAB-COLD-01
        name: Labeling protocol
        protocol_type: labeling
        description: >
          Internal standards mixture containing 13C-labeled amino acids and
          deuterated lipid standards was added before extraction.
        version: "1.0"

    sources:
