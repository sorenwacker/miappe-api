# MIAPPE v1.1 Example: Wheat Drought Stress Field Trial
# A complete example demonstrating all MIAPPE entity types

unique_id: INV-2024-WHEAT-001
title: Impact of drought stress on wheat yield and quality traits
description: >
  Multi-year field trial investigating the effects of controlled drought stress
  on winter wheat (Triticum aestivum) yield components and grain quality parameters.
  Three wheat varieties with contrasting drought tolerance were evaluated under
  well-watered and water-limited conditions.
submission_date: "2024-03-15"
public_release_date: "2025-01-01"
license: https://creativecommons.org/licenses/by/4.0/
miappe_version: "1.1"
associated_publications:
  - "doi:10.1234/example.2024.001"
  - "doi:10.1234/example.2024.002"

contacts:
  - investigation_id: INV-2024-WHEAT-001
    name: Dr. Maria Schmidt
    email: m.schmidt@plant-research.edu
    institution: Institute for Plant Sciences
    role: Principal Investigator
    orcid: "0000-0001-2345-6789"
  - investigation_id: INV-2024-WHEAT-001
    name: Dr. Thomas Weber
    email: t.weber@plant-research.edu
    institution: Institute for Plant Sciences
    role: Co-Investigator
    orcid: "0000-0002-3456-7890"

studies:
  - unique_id: STU-2024-WHEAT-FT01
    investigation_id: INV-2024-WHEAT-001
    title: Wheat drought stress field trial 2024
    description: >
      Randomized complete block design with three replications evaluating
      drought stress effects on wheat performance at the Experimental Farm.
    start_date: "2023-10-15T08:00:00"
    end_date: "2024-07-20T18:00:00"
    contact_institution: Institute for Plant Sciences
    experimental_site_name: Experimental Farm South
    latitude: 48.1351
    longitude: 11.5820
    altitude: 520.0
    experimental_design_type: Randomized Complete Block Design
    experimental_design_description: >
      3 varieties x 2 treatments x 3 blocks = 18 plots.
      Each plot is 6m x 1.5m with 6 rows at 25cm spacing.
    observation_unit_level_hierarchy:
      - block
      - plot
      - plant
    observation_unit_description: Individual plots of 9 m2
    growth_facility_type: field
    cultural_practices: >
      Standard winter wheat cultivation. Sowing density 350 seeds/m2.
      Fertilization: 180 kg N/ha split in three applications.
      Fungicide treatment according to regional recommendations.
    map_of_experimental_design: https://example.com/maps/STU-2024-WHEAT-FT01.pdf

    persons:
      - study_id: STU-2024-WHEAT-FT01
        name: Anna Mueller
        email: a.mueller@plant-research.edu
        institution: Institute for Plant Sciences
        role: Field Technician

    geographic_location:
      unique_id: LOC-EXP-FARM-SOUTH
      study_id: STU-2024-WHEAT-FT01
      name: Experimental Farm South
      abbreviation: EFS
      country: Germany
      country_code: DEU
      latitude: 48.1351
      longitude: 11.5820
      altitude: 520.0
      description: University experimental farm, loamy soil, temperate climate
      address: Feldweg 1, 85354 Freising, Germany
      location_type: field

    biological_materials:
      - unique_id: BM-WHEAT-JULIUS
        study_id: STU-2024-WHEAT-FT01
        organism: Triticum aestivum
        genus: Triticum
        species: aestivum
        infraspecific_name: Julius
        accession_number: GBIS-DE-2015-001
        biological_material_description: >
          High-yielding winter wheat variety with moderate drought tolerance.
          Released 2015, widely grown in Central Europe.
        material_source:
          unique_id: MS-SAATZUCHT-01
          name: Saatzucht GmbH
          description: Commercial seed supplier
          institute_code: DEU001
          country: Germany
          address: Saatgutweg 10, 30159 Hannover
          latitude: 52.3759
          longitude: 9.7320

      - unique_id: BM-WHEAT-TOBAK
        study_id: STU-2024-WHEAT-FT01
        organism: Triticum aestivum
        genus: Triticum
        species: aestivum
        infraspecific_name: Tobak
        accession_number: GBIS-DE-2012-042
        biological_material_description: >
          Winter wheat variety known for high protein content and
          good drought tolerance. Released 2012.

      - unique_id: BM-WHEAT-BENCHMARK
        study_id: STU-2024-WHEAT-FT01
        organism: Triticum aestivum
        genus: Triticum
        species: aestivum
        infraspecific_name: Benchmark
        accession_number: GBIS-DE-2018-015
        biological_material_description: >
          Modern high-yielding variety with limited drought tolerance.
          Used as susceptible control.

    factors:
      - unique_id: FAC-WATER-REGIME
        study_id: STU-2024-WHEAT-FT01
        name: Water regime
        description: Irrigation treatment applied during grain filling stage
        factor_type: abiotic treatment
        values:
          - unique_id: FV-WELL-WATERED
            factor_name: FAC-WATER-REGIME
            value: Well-watered
            description: >
              Full irrigation maintaining soil moisture at 70-80% field capacity
              throughout the growing season.
          - unique_id: FV-DROUGHT-STRESS
            factor_name: FAC-WATER-REGIME
            value: Drought stress
            description: >
              Irrigation withheld from BBCH 61 (beginning of flowering) until
              BBCH 77 (late milk stage), reducing soil moisture to 30-40% FC.

    observed_variables:
      - unique_id: VAR-PLANT-HEIGHT
        study_id: STU-2024-WHEAT-FT01
        name: Plant height at maturity
        trait: Plant height
        trait_accession_number: CO_321:0000994
        trait_description: Height of the main stem from soil surface to tip of spike
        method: Ruler measurement
        method_accession_number: CO_321:0000859
        method_description: Measured with a ruler from ground level to spike tip
        scale: cm
        scale_accession_number: CO_321:0000928
        scale_description: Centimeters, range 0-200
        time_scale: At BBCH 92 (grain hard)

      - unique_id: VAR-GRAIN-YIELD
        study_id: STU-2024-WHEAT-FT01
        name: Grain yield
        trait: Grain yield per plot
        trait_accession_number: CO_321:0000198
        trait_description: Total grain weight per plot, adjusted to 14% moisture
        method: Combine harvest and weighing
        method_accession_number: CO_321:0000725
        method_description: Plot combine harvest, cleaned and weighed
        scale: kg/ha
        scale_accession_number: CO_321:0000929
        scale_description: Kilograms per hectare
        time_scale: At harvest maturity

      - unique_id: VAR-TKW
        study_id: STU-2024-WHEAT-FT01
        name: Thousand kernel weight
        trait: Thousand kernel weight
        trait_accession_number: CO_321:0000336
        trait_description: Weight of 1000 grains at 14% moisture content
        method: Seed counter and balance
        method_accession_number: CO_321:0000726
        method_description: Counted 1000 seeds using automatic counter, weighed on precision balance
        scale: g
        scale_accession_number: CO_321:0000930
        scale_description: Grams

      - unique_id: VAR-PROTEIN
        study_id: STU-2024-WHEAT-FT01
        name: Grain protein content
        trait: Grain protein content
        trait_accession_number: CO_321:0000270
        trait_description: Total nitrogen content multiplied by 5.7
