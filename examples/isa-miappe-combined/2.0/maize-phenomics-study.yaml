# ISA-MIAPPE-Combined v2.0 Example: Maize Phenotyping Study
# v2.0 introduces Experiment entity for trial-level details
# A complete example demonstrating all v2.0 entity types

identifier: COMB-2024-MAIZE-001
title: High-throughput phenotyping of maize under nitrogen stress
description: >
  Image-based phenotyping study of maize inbred lines under optimal and
  low nitrogen conditions. Uses the v2.0 Experiment entity to organize
  trial-level metadata separately from Study design metadata.
