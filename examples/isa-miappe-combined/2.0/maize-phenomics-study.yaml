studies:
  - identifier: STU-MAIZE-N-2024
    investigation_id: COMB-2024-MAIZE-001
    title: Maize nitrogen use efficiency phenotyping 2024
    description: >
      Greenhouse experiment with automated phenotyping platform evaluating
      nitrogen stress effects on maize performance. Study design includes
      multiple genotypes and nitrogen treatments in a factorial design.
    experimental_design_type: factorial
    experimental_design_description: >
      2 nitrogen treatments x 4 genotypes x 6 replicates = 48 pots.
      Fully randomized within greenhouse conveyor system.

    contacts:
      - study_id: STU-MAIZE-N-2024
        family_name: Kim
        given_name: Sung
        email: s.kim@phenomics-center.org
        affiliation: International Phenomics Center
        orcid: "0000-0003-4567-8901"
        roles:
          - data analyst
          - software developer

    protocols:
      - study_id: STU-MAIZE-N-2024
        name: Plant growth protocol
        protocol_type: growth protocol
        description: >
          Seeds germinated in wet paper for 3 days at 28C. Seedlings transplanted
          to 5L pots filled with perlite:vermiculite (1:1). Nutrient solution
          applied via automated drip irrigation 4 times daily.
        version: "2.0"
        uri: https://protocols.io/view/maize-greenhouse-growth-456
        parameters:
          - name: germination_temp
            parameter_name: germination temperature
          - name: pot_volume
            parameter_name: pot volume
          - name: substrate
            parameter_name: growth substrate

      - study_id: STU-MAIZE-N-2024
        name: RGB imaging protocol
        protocol_type: data acquisition
        description: >
          Daily RGB imaging using LemnaTec Scanalyzer 3D. Three images per plant:
          top view and two side views at 90 degree rotation. Resolution 4096x3000 pixels.
        version: "1.5"
        parameters:
          - name: image_resolution
            parameter_name: image resolution
          - name: imaging_frequency
            parameter_name: imaging frequency
          - name: camera_model
            parameter_name: camera model

      - study_id: STU-MAIZE-N-2024
        name: Nitrogen treatment protocol
        protocol_type: treatment protocol
        description: >
          High nitrogen: 15 mM NH4NO3 in modified Hoagland solution.
          Low nitrogen: 1.5 mM NH4NO3 in modified Hoagland solution.
          Treatment initiated at 14 days after planting.
        version: "1.0"

      - study_id: STU-MAIZE-N-2024
        name: Harvest protocol
        protocol_type: sample collection
        description: >
          Plants harvested at V12 stage. Shoot and root biomass separated,
          dried at 70C for 72h in forced-air oven, and weighed. Leaf tissue
          samples collected from youngest fully expanded leaf for nitrogen
          content analysis.
        version: "1.0"

      - study_id: STU-MAIZE-N-2024
        name: Elemental analysis protocol
        protocol_type: data acquisition
        description: >
          Flash combustion with thermal conductivity detection using LECO
          TruSpec CN analyzer. Samples dried, ground, and weighed to 0.1mg.
        version: "1.0"

