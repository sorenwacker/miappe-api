    # v2.0 feature: Experiment entity groups trial-level details
    experiments:
      - identifier: EXP-MAIZE-2024
        name: Maize N efficiency trial 2024
        description: >
          Main phenotyping trial in automated greenhouse system. Plants imaged
          daily on conveyor system. Nitrogen treatments applied via fertigation.
        start_date: "2024-03-01T08:00:00"
        end_date: "2024-06-15T18:00:00"
        experimental_site_name: Automated Phenotyping Greenhouse
        latitude: 41.9028
        longitude: 12.4964
        altitude: 50.0
        growth_facility_type: greenhouse
        cultural_practices: >
          Automated fertigation 4x daily. Climate-controlled environment with
          supplemental LED lighting. Conveyor system for automated imaging.

        events:
          - identifier: EVT-SOWING
            study_id: STU-MAIZE-N-2024
            event_type: Sowing
            date: "2024-03-01T09:00:00"
            description: Seeds placed in germination trays
            event_accession_number: AGRO:00000007

          - identifier: EVT-TRANSPLANT
            study_id: STU-MAIZE-N-2024
            event_type: Transplanting
            date: "2024-03-04T10:00:00"
            description: Seedlings transplanted to 5L pots
            event_accession_number: AGRO:00000512

          - identifier: EVT-TREATMENT-START
            study_id: STU-MAIZE-N-2024
            event_type: Treatment application
            date: "2024-03-15T08:00:00"
            description: Nitrogen treatments initiated at 14 DAP
            observation_unit_ids:
              - OU-B73-LN-R1
              - OU-Mo17-LN-R1

          - identifier: EVT-IMAGING-START
            study_id: STU-MAIZE-N-2024
            event_type: Phenotyping
            date: "2024-03-15T06:00:00"
            description: Automated daily imaging initiated

          - identifier: EVT-HARVEST
            study_id: STU-MAIZE-N-2024
            event_type: Harvest
            date: "2024-05-15T08:00:00"
            end_date: "2024-05-17T18:00:00"
            description: Destructive harvest for biomass measurements at V12 stage
            event_accession_number: AGRO:00000008

