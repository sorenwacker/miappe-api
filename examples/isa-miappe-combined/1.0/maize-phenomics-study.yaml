            factor_id: FAC-NITROGEN
            value: Low nitrogen

    events:
      - identifier: EVT-SOWING
        study_id: STU-MAIZE-N-2024
        event_type: Sowing
        date: "2024-03-01T09:00:00"
        description: Seeds placed in germination trays
        event_accession_number: AGRO:00000007

      - identifier: EVT-TRANSPLANT
        study_id: STU-MAIZE-N-2024
