# ISA-MIAPPE-Combined v1.0 Example: Maize Phenotyping Study
# A complete example demonstrating all combined ISA-MIAPPE entity types

identifier: COMB-2024-MAIZE-001
title: High-throughput phenotyping of maize under nitrogen stress
description: >
  Image-based phenotyping study of maize inbred lines under optimal and
  low nitrogen conditions. Combines ISA workflow tracking with MIAPPE
  observation structure for comprehensive metadata capture.
submission_date: "2024-04-01"
public_release_date: "2025-01-01"

contacts:
  - last_name: Garcia
    first_name: Carlos
    email: c.garcia@phenomics-center.org
    affiliation: International Phenomics Center
    roles:
      - principal investigator

  - last_name: Mueller
    first_name: Anna
    email: a.mueller@phenomics-center.org
    affiliation: International Phenomics Center
    roles:
      - data curator

publications:
  - pubmed_id: "98765432"
    doi: "10.1234/maize.phenomics.2024.001"
    author_list: "Garcia C, Kim S, Mueller A"
    title: Automated phenotyping reveals nitrogen use efficiency traits in maize
    status: submitted

ontology_source_references:
  - name: CO_322
    file: https://cropontology.org/ontology/CO_322
    version: "2023.1"
    description: Maize Crop Ontology

  - name: AGRO
    file: http://purl.obolibrary.org/obo/agro.owl
    version: "2023.06"
    description: Agronomy Ontology

studies:
  - identifier: STU-MAIZE-N-2024
    investigation_id: COMB-2024-MAIZE-001
    title: Maize nitrogen use efficiency phenotyping 2024
    description: >
      Greenhouse experiment with automated phenotyping platform evaluating
      nitrogen stress effects on maize growth, development, and yield.
    start_date: "2024-03-01T08:00:00"
    end_date: "2024-06-15T18:00:00"
    experimental_site_name: Automated Phenotyping Greenhouse
    latitude: 41.9028
    longitude: 12.4964
    growth_facility_type: greenhouse
    experimental_design_type: randomized complete block
    experimental_design_description: >
      Two nitrogen treatments x 4 genotypes x 6 replicates = 48 pots.
      Randomized within greenhouse lanes.

    contacts:
      - study_id: STU-MAIZE-N-2024
        last_name: Kim
        first_name: Sung
        email: s.kim@phenomics-center.org
        affiliation: International Phenomics Center
        roles:
          - data analyst

    protocols:
      - study_id: STU-MAIZE-N-2024
        name: Plant growth protocol
        protocol_type: growth protocol
        description: >
          Seeds germinated in wet paper for 3 days at 28C. Seedlings transplanted
          to 5L pots filled with perlite:vermiculite (1:1). Nutrient solution
          applied via automated drip irrigation.
        version: "2.0"
        uri: https://protocols.io/view/maize-greenhouse-growth-456
        parameters:
          - name: germination_temp
            parameter_name: germination temperature
          - name: pot_volume
            parameter_name: pot volume

      - study_id: STU-MAIZE-N-2024
        name: RGB imaging protocol
        protocol_type: data acquisition
        description: >
          Daily RGB imaging using LemnaTec Scanalyzer 3D. Three images per plant:
          top view and two side views at 90 degree rotation. Resolution 4096x3000 pixels.
        version: "1.5"
        parameters:
          - name: image_resolution
            parameter_name: image resolution
          - name: imaging_frequency
            parameter_name: imaging frequency

      - study_id: STU-MAIZE-N-2024
        name: Nitrogen treatment protocol
        protocol_type: treatment protocol
        description: >
          High nitrogen: 15 mM NH4NO3 in nutrient solution.
          Low nitrogen: 1.5 mM NH4NO3 in nutrient solution.
          Treatment applied from 14 days after planting.
        version: "1.0"

      - study_id: STU-MAIZE-N-2024
        name: Harvest protocol
        protocol_type: sample collection
        description: >
          Plants harvested at V12 stage. Shoot and root biomass separated,
          dried at 70C for 72h, and weighed. Leaf samples collected for
          nitrogen content analysis.
        version: "1.0"

    sources:
      - study_id: STU-MAIZE-N-2024
        name: B73_seed_lot_2024
        characteristics:
          - category: organism
            value: Zea mays
          - category: seed lot
            value: B73-2024-01

      - study_id: STU-MAIZE-N-2024
        name: Mo17_seed_lot_2024
        characteristics:
          - category: organism
            value: Zea mays
          - category: seed lot
            value: Mo17-2024-01

    samples:
      - study_id: STU-MAIZE-N-2024
        name: B73_HN_R1_leaf
        derives_from:
          - B73_seed_lot_2024
        characteristics:
          - category: tissue type
            value: leaf
          - category: developmental stage
            value: V12

      - study_id: STU-MAIZE-N-2024
        name: B73_LN_R1_leaf
        derives_from:
          - B73_seed_lot_2024
        characteristics:
          - category: tissue type
            value: leaf
          - category: developmental stage
            value: V12

      - study_id: STU-MAIZE-N-2024
        name: Mo17_HN_R1_leaf
        derives_from:
          - Mo17_seed_lot_2024
        characteristics:
          - category: tissue type
            value: leaf

    biological_materials:
      - identifier: BM-B73
        study_id: STU-MAIZE-N-2024
        organism: Zea mays
        genus: Zea
        species: mays
        infraspecific_name: B73
        accession_number: PI550473
        biological_material_description: Reference inbred line with good nitrogen use efficiency.
        material_source:
          identifier: MS-USDA-GRIN
          name: USDA GRIN
          description: USDA Germplasm Resources Information Network
          country: United States
          institute_code: USA001

      - identifier: BM-Mo17
        study_id: STU-MAIZE-N-2024
        organism: Zea mays
        genus: Zea
        species: mays
        infraspecific_name: Mo17
        accession_number: PI558532
        biological_material_description: Second reference inbred line, used in B73xMo17 hybrid.

      - identifier: BM-W22
        study_id: STU-MAIZE-N-2024
        organism: Zea mays
        genus: Zea
        species: mays
        infraspecific_name: W22
        accession_number: PI587142
        biological_material_description: Inbred with moderate nitrogen use efficiency.

      - identifier: BM-PH207
        study_id: STU-MAIZE-N-2024
        organism: Zea mays
        genus: Zea
        species: mays
        infraspecific_name: PH207
        accession_number: PI601810
        biological_material_description: Stiff stalk inbred line.

    factors:
      - identifier: FAC-NITROGEN
        study_id: STU-MAIZE-N-2024
        name: Nitrogen level
        description: Nitrogen concentration in nutrient solution
        factor_type: chemical compound
        values:
          - identifier: FV-HIGH-N
            factor_id: FAC-NITROGEN
            value: High nitrogen
            description: 15 mM NH4NO3 in nutrient solution

          - identifier: FV-LOW-N
            factor_id: FAC-NITROGEN
            value: Low nitrogen
            description: 1.5 mM NH4NO3 in nutrient solution

      - identifier: FAC-GENOTYPE
        study_id: STU-MAIZE-N-2024
        name: Genotype
        description: Maize inbred line
        factor_type: genetic factor
        values:
          - identifier: FV-B73
            factor_id: FAC-GENOTYPE
            value: B73

          - identifier: FV-Mo17
            factor_id: FAC-GENOTYPE
            value: Mo17

          - identifier: FV-W22
            factor_id: FAC-GENOTYPE
            value: W22

          - identifier: FV-PH207
            factor_id: FAC-GENOTYPE
            value: PH207

    observed_variables:
      - identifier: VAR-PROJECTED-AREA
        study_id: STU-MAIZE-N-2024
        name: Projected shoot area
        trait: Shoot area
        trait_accession_number: CO_322:0000123
        trait_description: Total projected area of above-ground plant parts from side view
        method: RGB image segmentation
        method_accession_number: CO_322:0000456
        method_description: Automated segmentation and pixel counting using PlantCV
        scale: cm2
        time_scale: Daily from 14 DAP to 60 DAP

      - identifier: VAR-PLANT-HEIGHT
        study_id: STU-MAIZE-N-2024
        name: Plant height
        trait: Plant height
        trait_accession_number: CO_322:0000789
        trait_description: Height from soil surface to highest point
        method: RGB image analysis
        method_description: Calculated from side view images
        scale: cm
        time_scale: Daily from 14 DAP to 60 DAP

      - identifier: VAR-SHOOT-BIOMASS
        study_id: STU-MAIZE-N-2024
        name: Shoot dry biomass
        trait: Shoot biomass
        trait_accession_number: CO_322:0000234
        trait_description: Dry weight of above-ground biomass
        method: Gravimetric measurement
        method_description: Dried at 70C for 72h, weighed on analytical balance
        scale: g
        time_scale: At harvest (V12 stage)

      - identifier: VAR-LEAF-N
        study_id: STU-MAIZE-N-2024
        name: Leaf nitrogen content
        trait: Leaf nitrogen concentration
        trait_description: Total nitrogen content in leaf tissue
        method: Elemental analysis
        method_description: Flash combustion with thermal conductivity detection
        scale: "% dry weight"
        time_scale: At harvest

    observation_units:
      - identifier: OU-B73-HN-R1
        study_id: STU-MAIZE-N-2024
        observation_unit_type: pot
        biological_material_id: BM-B73
