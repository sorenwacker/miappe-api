      - identifier: OU-Mo17-HN-R1
        study_id: STU-MAIZE-N-2024
        observation_unit_type: pot
        biological_material_id: BM-Mo17
        spatial_distribution: "lane:1,position:3"
        observation_unit_block: "1"
        observation_unit_replicate: "1"
        entry_type: test
        factor_values:
          - identifier: FV-Mo17-HN-R1-N
            factor_id: FAC-NITROGEN
