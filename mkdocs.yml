site_name: Metaseed
site_description: Tools for creating, editing, and validating experimental metadata following MIAPPE standards

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - panzoom:
      full_screen: true
      key: ctrl

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Profiles:
      - ISA: profiles/isa.md
      - MIAPPE: profiles/miappe.md
      - Combined: profiles/combined.md
  - Discussion:
      - Comparison: discussion/comparison.md
  - Architecture:
      - Overview: architecture/overview.md
      - Model Factory: architecture/model-factory.md
  - API Reference:
      - CLI: api/cli.md
      - REST API: api/rest.md
      - Schema Specs: api/schema-specs.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
