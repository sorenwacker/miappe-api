site_name: MIAPPE-API
site_description: Schema-driven API for MIAPPE-compliant phenotyping metadata

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Architecture:
      - Overview: architecture/overview.md
      - ISA vs MIAPPE: architecture/isa-miappe-comparison.md
      - Schema Specs: architecture/schema-specs.md
      - Model Factory: architecture/model-factory.md
  - API Reference:
      - CLI: api/cli.md
      - REST API: api/rest.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
