name: DataFile
version: "1.1"
ontology_term: PPEO:data_file
description: >
  A data file associated with a study, containing observation data,
  images, or other research outputs. Data files should include
  sufficient metadata for interpretation and reuse.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the data file.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: name
    type: string
    required: true
    description: Filename or human-readable name of the data file.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: link
    type: uri
    required: false
    description: URL or path to the data file location.
    ontology_term: PPEO:hasDigitalLocation

  - name: description
    type: string
    required: false
    description: Description of the data file contents.
    ontology_term: PPEO:hasDescription

  - name: version
    type: string
    required: false
    description: Version of the data file.
    ontology_term: PPEO:hasVersion

  - name: file_type
    type: string
    required: false
    description: >
      Type or format of the data file (e.g., CSV, TSV, Excel, image).
    ontology_term: PPEO:hasFileType
