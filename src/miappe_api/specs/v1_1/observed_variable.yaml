name: ObservedVariable
version: "1.1"
ontology_term: PPEO:observed_variable
description: >
  An observed variable represents a trait, method, and scale combination
  used to measure phenotypic characteristics in a study. It follows the
  Crop Ontology variable model.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the observed variable within the study.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: name
    type: string
    required: true
    description: Human-readable name of the observed variable.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: trait
    type: string
    required: false
    description: >
      The trait being measured. Should reference a trait ontology term
      when possible.
    ontology_term: PPEO:hasTrait

  - name: trait_accession_number
    type: string
    required: false
    description: Accession number of the trait in an ontology (e.g., TO:0000001).
    ontology_term: PPEO:hasTraitAccession

  - name: trait_description
    type: string
    required: false
    description: Description of the trait being measured.
    ontology_term: PPEO:hasDescription

  - name: method
    type: string
    required: false
    description: >
      The measurement method used. Should describe how the observation
      was made or measured.
    ontology_term: PPEO:hasMethod

  - name: method_accession_number
    type: string
    required: false
    description: Accession number of the method in an ontology.
    ontology_term: PPEO:hasMethodAccession

  - name: method_description
    type: string
    required: false
    description: Detailed description of the measurement method.
    ontology_term: PPEO:hasDescription

  - name: scale
    type: string
    required: false
    description: >
      The scale or unit of measurement. Should describe the range,
      categories, or units used.
    ontology_term: PPEO:hasScale

  - name: scale_accession_number
    type: string
    required: false
    description: Accession number of the scale in an ontology.
    ontology_term: PPEO:hasScaleAccession

  - name: scale_description
    type: string
    required: false
    description: Description of the measurement scale.
    ontology_term: PPEO:hasDescription

  - name: time_scale
    type: string
    required: false
    description: >
      Time scale for the observation (e.g., days after planting,
      growth stage, calendar date).
    ontology_term: PPEO:hasTimeScale

  - name: reference
    type: uri
    required: false
    description: URI reference to the variable definition in an ontology.
    ontology_term: PPEO:hasExternalIdentifier
