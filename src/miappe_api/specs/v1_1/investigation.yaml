name: Investigation
version: "1.1"
ontology_term: PPEO:investigation
description: >
  A MIAPPE investigation represents a phenotyping project or experiment.
  An investigation contains one or more studies and metadata about the
  overall project, including submission information and licensing.

fields:
  - name: unique_id
    type: string
    required: true
    description: >
      Unique identifier for the investigation. Must be locally unique
      and follow the pattern of alphanumeric characters, underscores,
      and hyphens.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: title
    type: string
    required: true
    description: Human-readable title of the investigation.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: description
    type: string
    required: false
    description: >
      Detailed description of the investigation, including objectives,
      background, and scope.
    ontology_term: PPEO:hasDescription

  - name: submission_date
    type: date
    required: false
    description: >
      Date the investigation was submitted to an archive or repository.
      Format: ISO 8601 (YYYY-MM-DD).
    ontology_term: PPEO:hasSubmissionDate

  - name: public_release_date
    type: date
    required: false
    description: >
      Date when the investigation becomes publicly available.
      Format: ISO 8601 (YYYY-MM-DD).
    ontology_term: PPEO:hasPublicReleaseDate

  - name: license
    type: uri
    required: false
    description: >
      URL to the license under which the investigation data is released.
      Should be a valid URI pointing to a license document.
    ontology_term: PPEO:hasLicense

  - name: miappe_version
    type: string
    required: false
    description: >
      Version of the MIAPPE standard used. Defaults to 1.1 if not specified.
    ontology_term: PPEO:hasMIAPPEVersion
    constraints:
      pattern: "^[0-9]+\\.[0-9]+$"

  - name: associated_publications
    type: list
    items: string
    required: false
    description: >
      List of DOIs or URLs to publications associated with this investigation.
    ontology_term: PPEO:hasAssociatedPublication

  - name: contacts
    type: list
    items: Person
    required: false
    description: >
      List of persons responsible for or associated with the investigation.
    ontology_term: PPEO:hasPersonWithRole

  - name: studies
    type: list
    items: Study
    required: false
    description: >
      List of studies contained within this investigation. An investigation
      must contain at least one study to be complete.
    ontology_term: PPEO:hasPart
