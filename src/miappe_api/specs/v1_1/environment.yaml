name: Environment
version: "1.1"
ontology_term: PPEO:environment
description: >
  Environmental conditions recorded during a study. This includes
  parameters such as temperature, humidity, light intensity, soil
  properties, and other conditions that may affect plant growth.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the environment record.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: parameter
    type: string
    required: true
    description: >
      Name of the environmental parameter (e.g., temperature,
      relative humidity, photoperiod). Use ontology terms when possible.
    ontology_term: PPEO:hasEnvironmentParameter
    constraints:
      min_length: 1
      max_length: 255

  - name: parameter_accession_number
    type: string
    required: false
    description: Accession number of the parameter in an ontology.
    ontology_term: PPEO:hasEnvironmentParameterAccession

  - name: value
    type: string
    required: false
    description: >
      Value of the environmental parameter. Can be a single value,
      range, or descriptive text.
    ontology_term: PPEO:hasValue

  - name: unit
    type: string
    required: false
    description: Unit of measurement for the value.
    ontology_term: PPEO:hasUnit

  - name: date
    type: datetime
    required: false
    description: Date and time when the parameter was recorded.
    ontology_term: PPEO:hasDateTime

  - name: description
    type: string
    required: false
    description: Additional description or context for the environment record.
    ontology_term: PPEO:hasDescription
