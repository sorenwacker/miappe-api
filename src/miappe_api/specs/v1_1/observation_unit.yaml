name: ObservationUnit
version: "1.1"
ontology_term: PPEO:observation_unit
description: >
  An observation unit is the smallest unit on which observations are made.
  It can be a single plant, a plot, a pot, or any other defined experimental
  unit within a study.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the observation unit within the study.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: observation_unit_type
    type: string
    required: false
    description: >
      Type of observation unit (e.g., plant, plot, pot, block, sub-block).
    ontology_term: PPEO:hasObservationLevel

  - name: biological_material_id
    type: string
    required: false
    description: Reference to the biological material assigned to this unit.
    ontology_term: PPEO:hasBiologicalMaterial

  - name: spatial_distribution_type
    type: string
    required: false
    description: >
      Type of spatial distribution (e.g., rows, columns, blocks, coordinates).
    ontology_term: PPEO:hasSpatialDistributionType

  - name: spatial_distribution
    type: string
    required: false
    description: >
      Spatial position information for the observation unit within the study.
      Format depends on spatial_distribution_type.
    ontology_term: PPEO:hasSpatialDistribution

  - name: observation_unit_x_ref
    type: string
    required: false
    description: >
      X coordinate or column position of the observation unit.
    ontology_term: PPEO:hasSpatialCoordinate

  - name: observation_unit_y_ref
    type: string
    required: false
    description: >
      Y coordinate or row position of the observation unit.
    ontology_term: PPEO:hasSpatialCoordinate

  - name: observation_unit_block
    type: string
    required: false
    description: Block identifier for the observation unit.
    ontology_term: PPEO:hasSpatialDistribution

  - name: observation_unit_replicate
    type: string
    required: false
    description: Replicate number for the observation unit.
    ontology_term: PPEO:hasEntryNumber

  - name: entry_type
    type: string
    required: false
    description: >
      Type of entry (e.g., test, check, filler).
    ontology_term: PPEO:hasEntryType

  - name: observation_level
    type: string
    required: false
    description: >
      Level in the observation unit hierarchy
      (e.g., plant, plot, sub-plot).
    ontology_term: PPEO:hasObservationLevel

  - name: observation_level_code
    type: string
    required: false
    description: Code or number at the observation level.
    ontology_term: PPEO:hasIdentifier

  - name: factor_values
    type: list
    items: FactorValue
    required: false
    description: Factor values applied to this observation unit.
    ontology_term: PPEO:hasFactorValue

  - name: samples
    type: list
    items: Sample
    required: false
    description: Samples derived from this observation unit.
    ontology_term: PPEO:hasSample

  - name: external_references
    type: list
    items: string
    required: false
    description: External database identifiers for the observation unit.
    ontology_term: PPEO:hasExternalIdentifier
