name: BiologicalMaterial
version: "1.1"
ontology_term: PPEO:biological_material
description: >
  Biological material used in a study. This represents the germplasm,
  cultivar, or genetic material being studied, including its identification
  and origin information.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the biological material within the study.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: organism
    type: string
    required: false
    description: Scientific name of the organism (genus and species).
    ontology_term: PPEO:hasOrganism

  - name: genus
    type: string
    required: false
    description: Genus of the organism.
    ontology_term: PPEO:hasGenus

  - name: species
    type: string
    required: false
    description: Species epithet of the organism.
    ontology_term: PPEO:hasSpecies

  - name: infraspecific_name
    type: string
    required: false
    description: >
      Infraspecific name (subspecies, variety, cultivar, etc.)
      of the biological material.
    ontology_term: PPEO:hasInfraspecificName

  - name: material_source
    type: string
    required: false
    description: Reference to the material source (genebank, collection, etc.).
    ontology_term: PPEO:hasMaterialSource

  - name: accession_number
    type: string
    required: false
    description: >
      Accession number assigned by the holding institution
      (e.g., genebank accession).
    ontology_term: PPEO:hasGermplasmAccessionNumber

  - name: biological_material_description
    type: string
    required: false
    description: Free-text description of the biological material.
    ontology_term: PPEO:hasDescription

  - name: biological_material_latitude
    type: float
    required: false
    description: >
      Latitude of the collection site or origin in decimal degrees (WGS84).
    ontology_term: PPEO:hasLatitude
    constraints:
      minimum: -90
      maximum: 90

  - name: biological_material_longitude
    type: float
    required: false
    description: >
      Longitude of the collection site or origin in decimal degrees (WGS84).
    ontology_term: PPEO:hasLongitude
    constraints:
      minimum: -180
      maximum: 180

  - name: biological_material_altitude
    type: float
    required: false
    description: Altitude of the collection site in meters above sea level.
    ontology_term: PPEO:hasAltitude

  - name: biological_material_coordinates_uncertainty
    type: string
    required: false
    description: Uncertainty associated with the coordinate values.
    ontology_term: PPEO:hasCoordinatesUncertainty

  - name: biological_material_preprocessing
    type: string
    required: false
    description: >
      Description of any preprocessing applied to the biological material
      before the study (e.g., seed treatment, tissue culture).
    ontology_term: PPEO:hasPreprocessing

  - name: external_references
    type: list
    items: string
    required: false
    description: >
      List of external database identifiers for the biological material
      (e.g., genebank DOI, NCBI taxonomy ID).
    ontology_term: PPEO:hasExternalIdentifier
