name: Location
version: "1.1"
ontology_term: PPEO:location
description: >
  A geographic location where a study is conducted or where biological
  material originates. Includes coordinates and place name information.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the location.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: name
    type: string
    required: true
    description: Name of the location or site.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: abbreviation
    type: string
    required: false
    description: Short abbreviation or code for the location.
    ontology_term: PPEO:hasAbbreviation
    constraints:
      max_length: 20

  - name: country
    type: string
    required: false
    description: Country where the location is situated.
    ontology_term: PPEO:hasCountry

  - name: country_code
    type: string
    required: false
    description: ISO 3166-1 alpha-3 country code.
    ontology_term: PPEO:hasCountryCode
    constraints:
      pattern: "^[A-Z]{3}$"

  - name: latitude
    type: float
    required: false
    description: Latitude in decimal degrees (WGS84).
    ontology_term: PPEO:hasLatitude
    constraints:
      minimum: -90
      maximum: 90

  - name: longitude
    type: float
    required: false
    description: Longitude in decimal degrees (WGS84).
    ontology_term: PPEO:hasLongitude
    constraints:
      minimum: -180
      maximum: 180

  - name: altitude
    type: float
    required: false
    description: Altitude in meters above sea level.
    ontology_term: PPEO:hasAltitude

  - name: description
    type: string
    required: false
    description: Description of the location.
    ontology_term: PPEO:hasDescription

  - name: address
    type: string
    required: false
    description: Full address of the location.
    ontology_term: PPEO:hasAddress

  - name: location_type
    type: string
    required: false
    description: >
      Type of location (e.g., field, greenhouse, growth chamber, laboratory).
    ontology_term: PPEO:hasLocationType
