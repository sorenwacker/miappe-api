name: Event
version: "1.1"
ontology_term: PPEO:event
description: >
  An event represents a discrete occurrence during a study, such as
  planting, watering, fertilization, pest control, or harvest.
  Events document what was done to the observation units and when.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the event within the study.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: event_type
    type: string
    required: true
    description: >
      Type of event (e.g., planting, fertilization, irrigation, harvest).
      Use ontology terms when possible.
    ontology_term: PPEO:hasEventType
    constraints:
      min_length: 1
      max_length: 255

  - name: date
    type: datetime
    required: false
    description: Date and time when the event occurred.
    ontology_term: PPEO:hasDateTime

  - name: end_date
    type: datetime
    required: false
    description: End date and time if the event spans a period.
    ontology_term: PPEO:hasEndDateTime

  - name: description
    type: string
    required: false
    description: Detailed description of the event.
    ontology_term: PPEO:hasDescription

  - name: observation_unit_ids
    type: list
    items: string
    required: false
    description: >
      List of observation unit IDs affected by this event.
      If empty, the event applies to all units in the study.
    ontology_term: PPEO:hasObservedSubject

  - name: event_accession_number
    type: string
    required: false
    description: Accession number of the event type in an ontology.
    ontology_term: PPEO:hasEventAccession
