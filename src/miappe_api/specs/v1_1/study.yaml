name: Study
version: "1.1"
ontology_term: PPEO:study
description: >
  A study represents a single experiment within an investigation. It contains
  information about the experimental design, location, growing conditions,
  and the actual observations made during the experiment.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the study within the investigation.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: title
    type: string
    required: true
    description: Human-readable title of the study.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: description
    type: string
    required: false
    description: Detailed description of the study objectives and design.
    ontology_term: PPEO:hasDescription

  - name: start_date
    type: date
    required: false
    description: "Start date of the study. Format: ISO 8601 (YYYY-MM-DD)."
    ontology_term: PPEO:hasStartDate

  - name: end_date
    type: date
    required: false
    description: "End date of the study. Format: ISO 8601 (YYYY-MM-DD)."
    ontology_term: PPEO:hasEndDate

  - name: contact_institution
    type: string
    required: false
    description: Name of the institution responsible for the study.
    ontology_term: PPEO:hasContactInstitution

  - name: geographic_location
    type: string
    required: false
    description: >
      Geographic location where the study was conducted.
      Country or more specific location.
    ontology_term: PPEO:hasLocation

  - name: experimental_site_name
    type: string
    required: false
    description: Name of the experimental site (field, greenhouse, growth chamber).
    ontology_term: PPEO:hasGrowthFacility

  - name: latitude
    type: float
    required: false
    description: Latitude of the experimental site in decimal degrees (WGS84).
    ontology_term: PPEO:hasLatitude
    constraints:
      minimum: -90
      maximum: 90

  - name: longitude
    type: float
    required: false
    description: Longitude of the experimental site in decimal degrees (WGS84).
    ontology_term: PPEO:hasLongitude
    constraints:
      minimum: -180
      maximum: 180

  - name: altitude
    type: float
    required: false
    description: Altitude of the experimental site in meters above sea level.
    ontology_term: PPEO:hasAltitude

  - name: experimental_design_type
    type: string
    required: false
    description: >
      Type of experimental design used (e.g., randomized complete block design,
      split-plot design, augmented design).
    ontology_term: PPEO:hasExperimentalDesign

  - name: experimental_design_description
    type: string
    required: false
    description: Free-text description of the experimental design.
    ontology_term: PPEO:hasDescription

  - name: observation_unit_level_hierarchy
    type: list
    items: string
    required: false
    description: >
      Hierarchy of observation unit levels from top to bottom
      (e.g., block, plot, plant, leaf).
    ontology_term: PPEO:hasObservationLevelHierarchy

  - name: observation_unit_description
    type: string
    required: false
    description: Description of the observation units used in the study.
    ontology_term: PPEO:hasObservationUnitDescription

  - name: growth_facility_type
    type: string
    required: false
    description: Type of growth facility (field, greenhouse, growth chamber, etc.).
    ontology_term: PPEO:hasGrowthFacility

  - name: cultural_practices
    type: string
    required: false
    description: Description of cultural practices applied during the study.
    ontology_term: PPEO:hasCulturalPractices

  - name: map_of_experimental_design
    type: uri
    required: false
    description: URL to a file containing the experimental design layout/map.
    ontology_term: PPEO:hasExperimentalDesignMap

  - name: persons
    type: list
    items: Person
    required: false
    description: List of persons involved in the study.
    ontology_term: PPEO:hasPersonWithRole

  - name: data_files
    type: list
    items: DataFile
    required: false
    description: List of data files associated with the study.
    ontology_term: PPEO:hasDataFile

  - name: biological_materials
    type: list
    items: BiologicalMaterial
    required: false
    description: Biological materials used in the study.
    ontology_term: PPEO:hasBiologicalMaterial

  - name: observation_units
    type: list
    items: ObservationUnit
    required: false
    description: Observation units in the study.
    ontology_term: PPEO:hasPart

  - name: observed_variables
    type: list
    items: ObservedVariable
    required: false
    description: Variables observed in the study.
    ontology_term: PPEO:hasVariable

  - name: factors
    type: list
    items: Factor
    required: false
    description: Experimental factors in the study.
    ontology_term: PPEO:hasFactor

  - name: events
    type: list
    items: Event
    required: false
    description: Events that occurred during the study.
    ontology_term: PPEO:hasEvent

  - name: environments
    type: list
    items: Environment
    required: false
    description: Environmental conditions recorded during the study.
    ontology_term: PPEO:hasEnvironment
