name: FactorValue
version: "1.1"
ontology_term: PPEO:factor_value
description: >
  A specific value or level of an experimental factor. Factor values
  are assigned to observation units to indicate the treatment or
  condition applied.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the factor value.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: factor_id
    type: string
    required: false
    description: Reference to the parent factor this value belongs to.
    ontology_term: PPEO:isModalityOf

  - name: value
    type: string
    required: true
    description: >
      The actual value or level (e.g., "drought", "100 kg/ha", "WT").
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1

  - name: description
    type: string
    required: false
    description: Description of this factor value or treatment level.
    ontology_term: PPEO:hasDescription
