name: MaterialSource
version: "1.1"
ontology_term: PPEO:material_source
description: >
  Source of biological material, typically a genebank, seed company, or
  research institution providing the germplasm used in the study.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the material source.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: name
    type: string
    required: true
    description: Name of the material source institution or provider.
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: description
    type: string
    required: false
    description: Description of the material source.
    ontology_term: PPEO:hasDescription

  - name: institute_code
    type: string
    required: false
    description: >
      FAO WIEWS institute code or other standardized identifier
      for the institution.
    ontology_term: PPEO:hasInstituteCode

  - name: country
    type: string
    required: false
    description: Country where the material source is located.
    ontology_term: PPEO:hasCountry

  - name: address
    type: string
    required: false
    description: Full address of the material source.
    ontology_term: PPEO:hasAddress

  - name: latitude
    type: float
    required: false
    description: Latitude of the material source location in decimal degrees.
    ontology_term: PPEO:hasLatitude
    constraints:
      minimum: -90
      maximum: 90

  - name: longitude
    type: float
    required: false
    description: Longitude of the material source location in decimal degrees.
    ontology_term: PPEO:hasLongitude
    constraints:
      minimum: -180
      maximum: 180
