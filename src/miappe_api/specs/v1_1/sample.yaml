name: Sample
version: "1.1"
ontology_term: PPEO:sample
description: >
  A sample derived from an observation unit for measurement or analysis.
  Samples can be plant parts, tissue extracts, or other derivatives used
  for phenotypic or molecular analysis.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the sample.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: observation_unit_id
    type: string
    required: false
    description: >
      Reference to the observation unit from which this sample was derived.
    ontology_term: PPEO:derivesFrom

  - name: plant_structural_development_stage
    type: string
    required: false
    description: >
      Development stage of the plant when the sample was collected.
      Use Plant Ontology terms when possible.
    ontology_term: PPEO:hasPlantStructureDevelopmentStage

  - name: plant_anatomical_entity
    type: string
    required: false
    description: >
      Plant anatomical entity from which the sample was derived
      (e.g., leaf, root, seed). Use Plant Ontology terms when possible.
    ontology_term: PPEO:hasPlantAnatomicalEntity

  - name: collection_date
    type: datetime
    required: false
    description: Date and time when the sample was collected.
    ontology_term: PPEO:hasCollectionDate

  - name: description
    type: string
    required: false
    description: Free-text description of the sample.
    ontology_term: PPEO:hasDescription

  - name: external_references
    type: list
    items: string
    required: false
    description: External database identifiers for the sample.
    ontology_term: PPEO:hasExternalIdentifier
