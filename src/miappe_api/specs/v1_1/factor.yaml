name: Factor
version: "1.1"
ontology_term: PPEO:factor
description: >
  An experimental factor is a controlled variable that is intentionally
  varied during the experiment. Factors can include treatments,
  genotypes, environmental conditions, or any other variable of interest.

fields:
  - name: unique_id
    type: string
    required: true
    description: Unique identifier for the factor within the study.
    ontology_term: PPEO:hasIdentifier
    constraints:
      pattern: "^[A-Za-z0-9_-]+$"
      min_length: 1
      max_length: 100

  - name: name
    type: string
    required: true
    description: Human-readable name of the factor (e.g., watering, nitrogen).
    ontology_term: PPEO:hasName
    constraints:
      min_length: 1
      max_length: 255

  - name: description
    type: string
    required: false
    description: Detailed description of the factor.
    ontology_term: PPEO:hasDescription

  - name: factor_type
    type: string
    required: false
    description: >
      Type of factor (e.g., treatment, genotype, environment).
      Use ontology terms when possible.
    ontology_term: PPEO:hasFactorType

  - name: values
    type: list
    items: FactorValue
    required: false
    description: Possible values or levels for this factor.
    ontology_term: PPEO:hasModality
