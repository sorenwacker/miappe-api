<nav class="breadcrumb">
    {% for item in breadcrumbs %}
    {% if not loop.first %}
    <span class="breadcrumb-sep">&gt;</span>
    {% endif %}

    {% if loop.last or not item.url %}
    <span class="breadcrumb-item {% if loop.last %}active{% endif %}">{{ item.label }}</span>
    {% else %}
    <span class="breadcrumb-item">
        <a href="#"
           hx-get="{{ item.url }}"
           hx-target="#main"
           hx-swap="innerHTML">{{ item.label }}</a>
    </span>
    {% endif %}
    {% endfor %}
</nav>
