<tr id="row-{{ row._idx }}" data-idx="{{ row._idx }}">
    {% for col in columns %}
    <td>
        <input type="text"
               class="form-input"
               name="{{ col }}"
               value="{{ row.get(col, '') }}"
               hx-post="/table/{{ field_name }}/row/{{ row._idx }}/cell"
               hx-trigger="change"
               hx-swap="none"
               data-field="{{ col }}"
               data-testid="cell-{{ row._idx }}-{{ col }}">
    </td>
    {% endfor %}
    <td>
        <button class="btn-icon danger"
                hx-delete="/table/{{ field_name }}/row/{{ row._idx }}"
                hx-target="#row-{{ row._idx }}"
                hx-swap="delete"
                data-testid="table-delete-row-{{ row._idx }}">
            &#128465;
        </button>
    </td>
</tr>
