        organism: Triticum aestivum
        genus: Triticum
        species: aestivum
        infraspecific_name: Tobak
        accession_number: GBIS-DE-2012-042
        biological_material_description: >
          Winter wheat variety known for high protein content and
          good drought tolerance. Released 2012.
        material_source_doi: https://doi.org/10.5281/zenodo.7654322
        material_source_accession_number: KWS-TOB-2012
        material_source_accession_name: Tobak Premium Wheat
        material_source_institute_code: DEU002
        material_source_institute_name: KWS SAAT SE
