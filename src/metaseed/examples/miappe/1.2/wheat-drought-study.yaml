        species: aestivum
        infraspecific_name: Julius
        accession_number: GBIS-DE-2015-001
        biological_material_description: >
          High-yielding winter wheat variety with moderate drought tolerance.
          Released 2015, widely grown in Central Europe.
        # New in MIAPPE 1.2: Material source detail fields
        material_source_doi: https://doi.org/10.5281/zenodo.7654321
        material_source_accession_number: GENEBANK-JUL-2015
        material_source_accession_name: Julius Winter Wheat Elite Line
        material_source_institute_code: DEU001
        material_source_institute_name: Saatzucht GmbH
        material_source_other_ids:
          - "EURISCO:DEU146-JULIUS"
          - "GRIN:PI-654321"
        material_source_latitude: 52.3759
        material_source_longitude: 9.7320
