experiments:
  - alias: ERX-COL0-0H-REP1
    title: RNA-Seq of Col-0 control (0h) replicate 1
    study_ref: PRJEB-ARABIDOPSIS-DROUGHT-2024
    sample_ref: SAMEA-COL0-0H-REP1
    design_description: >
      Total RNA extracted using RNeasy Plant Mini Kit (Qiagen).
      mRNA enrichment by poly-A selection. Library prepared using
      Illumina TruSeq Stranded mRNA kit.
    library_name: LIB-COL0-0H-R1
    library_strategy: RNA-Seq
    library_source: TRANSCRIPTOMIC
    library_selection: PolyA
    library_layout: PAIRED
    insert_size: 300
    insert_size_stddev: 50.0
    library_construction_protocol: >
      1. Total RNA extraction (RNeasy Plant Mini Kit)
      2. DNase treatment and quality control (RIN > 8.0)
      3. mRNA enrichment by poly-A selection
      4. cDNA synthesis and adapter ligation (TruSeq Stranded mRNA)
      5. PCR amplification (12 cycles)
      6. Size selection (300bp insert)
    platform: ILLUMINA
    instrument_model: Illumina NovaSeq 6000
    experiment_attributes:
      - tag: rna_integrity_number
        value: "9.2"
      - tag: library_concentration
        value: "15.3"
      - tag: library_concentration_units
        value: nM
    runs:
      - alias: ERR-COL0-0H-REP1
        experiment_ref: ERX-COL0-0H-REP1
        run_date: "2024-04-01"
        run_center: Plant Genomics Sequencing Facility
        files:
          - filename: COL0_0H_REP1_R1.fastq.gz
            filetype: fastq
            checksum_method: MD5
            checksum: a1b2c3d4e5f6789012345678abcdef01
            read_type: forward
          - filename: COL0_0H_REP1_R2.fastq.gz
            filetype: fastq
            checksum_method: MD5
            checksum: b2c3d4e5f6789012345678abcdef02a1
            read_type: reverse
        run_attributes:
          - tag: read_count
            value: "45000000"
          - tag: base_count
            value: "13500000000"

