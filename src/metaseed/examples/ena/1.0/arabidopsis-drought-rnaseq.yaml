# ENA v1.0 Example: Arabidopsis Drought Stress RNA-Seq Study
# Demonstrates ENA metadata model for a typical RNA-Seq experiment
# including samples, experiments, runs with paired-end files, and analysis

alias: PRJEB-ARABIDOPSIS-DROUGHT-2024
title: Transcriptomic response of Arabidopsis thaliana to drought stress
description: >
  RNA-Seq analysis of Arabidopsis thaliana Col-0 and Ler ecotypes under
  progressive drought stress. Leaf tissue was sampled at three time points
  (0h, 24h, 72h after water withdrawal) to characterize the transcriptomic
  response to dehydration. This study identifies differentially expressed
  genes and regulatory networks involved in drought tolerance mechanisms.
study_type: Transcriptome Analysis
center_name: Plant Genomics Institute
pubmed_ids:
  - "38123456"

project_links:
  - db: PUBMED
    id: "38123456"
    label: Associated publication
  - db: DOI
    id: "10.1234/plantgenomics.2024.001"
    label: Data descriptor

