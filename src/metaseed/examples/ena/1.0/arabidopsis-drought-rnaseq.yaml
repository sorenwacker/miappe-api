analyses:
  - alias: ERZ-DROUGHT-DESEQ2
    title: Differential expression analysis of drought response
    description: >
      DESeq2 analysis comparing gene expression between control and drought
      conditions at each time point, and between Col-0 and Ler ecotypes.
      Genes with adjusted p-value < 0.05 and |log2FC| > 1 considered significant.
    study_ref: PRJEB-ARABIDOPSIS-DROUGHT-2024
    sample_refs:
      - SAMEA-COL0-0H-REP1
      - SAMEA-COL0-0H-REP2
      - SAMEA-COL0-24H-REP1
      - SAMEA-COL0-72H-REP1
      - SAMEA-LER-0H-REP1
      - SAMEA-LER-72H-REP1
    run_refs:
      - ERR-COL0-0H-REP1
      - ERR-COL0-0H-REP2
      - ERR-COL0-24H-REP1
      - ERR-COL0-72H-REP1
      - ERR-LER-0H-REP1
      - ERR-LER-72H-REP1
    analysis_type: PROCESSED_READS
    files:
      - filename: counts_matrix.tsv.gz
        filetype: tab
        checksum_method: MD5
        checksum: 345678abcdef0dl2m1n0o9p8q7r6s5t4
      - filename: deseq2_results_col0_drought_vs_control.tsv.gz
        filetype: tab
        checksum_method: MD5
        checksum: 45678abcdef0em3n2o1p0q9r8s7t6u5v4
      - filename: deseq2_results_ler_drought_vs_control.tsv.gz
        filetype: tab
        checksum_method: MD5
        checksum: 5678abcdef0fn4o3p2q1r0s9t8u7v6w5x4
    analysis_attributes:
      - tag: analysis_software
        value: DESeq2 v1.40.0
      - tag: reference_genome
        value: TAIR10
      - tag: alignment_software
        value: STAR v2.7.10b
      - tag: quantification_method
        value: featureCounts v2.0.3
      - tag: normalization_method
        value: median of ratios (DESeq2)
