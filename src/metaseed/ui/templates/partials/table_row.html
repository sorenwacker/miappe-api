<tr id="row-{{ row._idx }}" data-idx="{{ row._idx }}">
    {% for col in columns %}
    <td>
        {% set col_type = column_types.get(col, 'string') if column_types else 'string' %}
        {% set constraints = column_constraints.get(col, {}) if column_constraints else {} %}
        <input type="text"
               class="form-input"
               name="{{ col }}"
               value="{{ row.get(col, '') }}"
               {% if col_type == 'date' %}
               pattern="\d{4}-\d{2}-\d{2}"
               placeholder="YYYY-MM-DD"
               title="Date format: YYYY-MM-DD"
               {% elif constraints.get('pattern') %}
               pattern="{{ constraints.pattern }}"
               {% endif %}
               {% if constraints.get('min_length') %}data-minlength="{{ constraints.min_length }}"{% endif %}
               {% if constraints.get('max_length') %}data-maxlength="{{ constraints.max_length }}"{% endif %}
               {% if constraints.get('minimum') is not none %}data-min="{{ constraints.minimum }}"{% endif %}
               {% if constraints.get('maximum') is not none %}data-max="{{ constraints.maximum }}"{% endif %}
               hx-post="/table/{{ parent_entity_type }}/{{ field_name }}/row/{{ row._idx }}/cell"
               hx-trigger="change"
               hx-swap="none"
               data-field="{{ col }}"
               data-type="{{ col_type }}"
               data-testid="cell-{{ row._idx }}-{{ col }}">
    </td>
    {% endfor %}
    <td class="row-actions">
        <button class="btn btn-sm btn-secondary"
                hx-get="/nested/{{ parent_entity_type }}/{{ field_name }}/{{ row._idx }}"
                hx-target="#main"
                hx-swap="innerHTML"
                title="Edit details and nested items"
                data-testid="row-edit-{{ row._idx }}">
            Edit
        </button>
        <button class="btn-icon danger"
                hx-delete="/table/{{ parent_entity_type }}/{{ field_name }}/row/{{ row._idx }}"
                hx-target="#row-{{ row._idx }}"
                hx-swap="delete"
                title="Delete row"
                data-testid="table-delete-row-{{ row._idx }}">
            &#128465;
        </button>
    </td>
</tr>
