<div class="card">
    <h2 class="card-title">Select Metadata Model</h2>
    <p class="card-subtitle">Choose which metadata standard to use for this investigation.</p>

    <div class="profile-options">
        {% for profile in profiles %}
        <button class="profile-option"
                hx-get="/form/Investigation?profile={{ profile.name }}"
                hx-target="#main"
                hx-swap="innerHTML"
                data-testid="profile-{{ profile.name }}">
            <h3>{{ profile.display_name }}</h3>
            <p>{{ profile.description }}</p>
        </button>
        {% endfor %}
    </div>
</div>
