<div class="card">
    <h2 class="card-title">Select Metadata Model</h2>
    <p class="card-subtitle">Choose which metadata standard and version to use, or load an example dataset.</p>

    <div class="profile-options">
        {% for profile in profiles %}
        <div class="profile-option-container">
            <div class="profile-option-header">
                <h3>{{ profile.display_name }}</h3>
                <p>{{ profile.description }}</p>
            </div>
            <div class="profile-versions">
                {% for version in profile.versions %}
                <div class="profile-version-row">
                    <button class="btn btn-sm {% if version == profile.latest_version %}btn-primary{% else %}btn-secondary{% endif %}"
                            hx-get="/form/{{ profile.root_entity }}?profile={{ profile.name }}&version={{ version }}"
                            hx-target="#main"
                            hx-swap="innerHTML"
                            data-testid="profile-{{ profile.name }}-v{{ version }}">
                        v{{ version }}{% if version == profile.latest_version %} (latest){% endif %}
                    </button>
                    <a class="btn btn-sm btn-outline-secondary"
                       href="/load-example/{{ profile.name }}/{{ version }}"
                       data-testid="example-{{ profile.name }}-v{{ version }}"
                       title="Load a fully populated example dataset for v{{ version }}">
                        Load Example
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
