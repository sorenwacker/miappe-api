<div id="lookup-modal" class="lookup-modal hidden">
    <div class="lookup-modal-backdrop" onclick="closeLookupModal()"></div>
    <div class="lookup-modal-content">
        <div class="lookup-modal-header">
            <h3>Select <span id="lookup-modal-entity-type"></span></h3>
            <button type="button" class="lookup-modal-close" onclick="closeLookupModal()" title="Close">&times;</button>
        </div>
        <div class="lookup-modal-body">
            <div class="lookup-modal-controls">
                <input type="text"
                       id="lookup-modal-search"
                       class="form-input"
                       placeholder="Search..."
                       autocomplete="off"
                       data-testid="lookup-modal-search">
                <label class="lookup-modal-multiselect-toggle">
                    <input type="checkbox" id="lookup-modal-multiselect" data-testid="lookup-modal-multiselect">
                    Multi-select
                </label>
            </div>
            <div id="lookup-modal-results" class="lookup-modal-results" data-testid="lookup-modal-results">
                <div class="lookup-modal-loading">Loading...</div>
            </div>
            <div id="lookup-modal-selection" class="lookup-modal-selection hidden">
                <span id="lookup-modal-selection-count">0 selected</span>
            </div>
        </div>
        <div id="lookup-modal-footer" class="lookup-modal-footer hidden">
            <button type="button" class="btn btn-secondary" onclick="closeLookupModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="confirmMultiSelect()" data-testid="lookup-modal-confirm">Confirm Selection</button>
        </div>
    </div>
</div>
