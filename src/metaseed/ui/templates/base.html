<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaseed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a7c59' rx='20' width='100' height='100'/></svg>">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=9">
</head>
<body hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
    <div class="layout">
        <header class="header">
            <h1 class="header-title">Metaseed</h1>
            <div class="header-actions">
                {% for entity_type in root_types %}
                <button class="btn btn-header"
                        hx-get="/form/{{ entity_type }}"
                        hx-target="#main"
                        hx-swap="innerHTML"
                        data-testid="btn-new-{{ entity_type|lower }}">
                    + {{ entity_type }}
                </button>
                {% endfor %}
                <span class="header-divider"></span>
                <label class="btn btn-header btn-file" data-testid="btn-import">
                    Import
                    <input type="file"
                           accept=".json"
                           hx-post="/import"
                           hx-trigger="change"
                           hx-target="#notification-container"
                           hx-swap="beforeend"
                           hx-encoding="multipart/form-data"
                           name="file"
                           hidden>
                </label>
                <a href="/export" class="btn btn-header" data-testid="btn-export" download>
                    Export
                </a>
            </div>
        </header>

        <main class="main" id="main">
            {% block content %}
            {% include "index.html" %}
            {% endblock %}
        </main>
    </div>

    <div id="notification-container" class="notification-container"></div>

    <script src="/static/js/app.js?v=7"></script>
</body>
</html>
