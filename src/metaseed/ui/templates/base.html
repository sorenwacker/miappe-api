<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaseed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a7c59' rx='20' width='100' height='100'/></svg>">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=15">
</head>
<body hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
    <div class="layout">
        <header class="header">
            <h1 class="header-title">Metaseed</h1>
            <div class="header-actions">
                {% for entity_type in root_types %}
                <button class="btn btn-header"
                        hx-get="/form/{{ entity_type }}"
                        hx-target="#main"
                        hx-swap="innerHTML"
                        data-testid="btn-new-{{ entity_type|lower }}">
                    + {{ entity_type }}
                </button>
                {% endfor %}
                <span class="header-divider"></span>
                <label class="btn btn-header btn-file" data-testid="btn-import">
                    Import
                    <input type="file"
                           accept=".json"
                           hx-post="/import"
                           hx-trigger="change"
                           hx-target="#notification-container"
                           hx-swap="beforeend"
                           hx-encoding="multipart/form-data"
                           name="file"
                           hidden>
                </label>
                <a href="/export" class="btn btn-header" data-testid="btn-export" download>
                    Export
                </a>
                <span class="header-divider"></span>
                <button id="graph-toggle" class="btn btn-header" onclick="toggleGraph()" data-testid="btn-graph">
                    Show Graph
                </button>
                <a href="/spec-builder" class="btn btn-header" data-testid="btn-spec-builder">
                    Spec Builder
                </a>
            </div>
        </header>

        <div id="graph-container" class="graph-container hidden">
            <div id="graph-controls" class="graph-controls">
                <label class="graph-control-label">
                    Spacing
                    <input type="range" id="graph-spacing" min="50" max="500" value="100" title="100" oninput="this.title=this.value; updateGraphPhysics()">
                </label>
                <label class="graph-control-label">
                    Repulsion
                    <input type="range" id="graph-repulsion" min="-1000" max="-100" value="-500" title="-500" oninput="this.title=this.value; updateGraphPhysics()">
                </label>
                <label class="graph-control-label">
                    Gravity
                    <input type="range" id="graph-gravity" min="0" max="0.1" step="0.005" value="0.01" title="0.01" oninput="this.title=this.value; updateGraphPhysics()">
                </label>
                <label class="graph-control-label">
                    Edge
                    <input type="range" id="graph-edge-width" min="0.5" max="5" step="0.5" value="1.5" title="1.5" oninput="this.title=this.value; updateGraphEdgeWidth()">
                </label>
                <button id="graph-layout-btn" class="btn btn-secondary btn-sm" onclick="toggleGraphLayout()">Hierarchical</button>
                <button class="btn btn-secondary btn-sm" onclick="fitGraph()">Fit</button>
            </div>
            <div id="graph-legend" class="graph-legend"></div>
            <div id="graph-view" class="graph-view"></div>
        </div>

        <main class="main" id="main">
            {% block content %}
            {% include "index.html" %}
            {% endblock %}
        </main>
    </div>

    <div id="notification-container" class="notification-container"></div>

    {% include "components/lookup_modal.html" %}

    <script src="/static/js/app.js?v=30"></script>
</body>
</html>
