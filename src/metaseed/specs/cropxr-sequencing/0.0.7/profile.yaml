name: cropxr-sequencing
display_name: CropXR Sequencing
version: '0.0.7'
description: CropXR Sequencing metadata schema. Extends phenotyping with sequencing-specific entities and fields.
root_entity: Investigation
entities:
  Investigation:
    description: An Investigation is a research programme with a defined aim.
    fields:
    - description: Identifier comprising the unique name of the institution/database hosting the submission of the investigation
        data, and the accession number of the investigation in that institution.
      name: investigation_id
      required: false
      type: string
    - description: Human-readable string summarising the investigation.
      name: investigation_title
      required: false
      type: string
    - description: Human-readable text describing the investigation in more detail.
      name: investigation_description
      required: false
      type: string
    - description: Date of submission of the dataset presently being described to a host repository.
      name: submission_date
      required: false
      type: string
    - description: Date of first public release of the dataset presently being described.
      name: public_release_date
      required: false
      type: string
    - description: License for the reuse of the data associated with this investigation. The Creative Commons licenses cover
        most use cases and are recommended.
      name: license
      required: false
      type: string
    - description: The version of MIAPPE used
      name: MIAPPE_version
      required: false
      type: float
    - description: An identifier for a literature publication where the investigation is described. Use of DOIs is recommended.
      name: associated_publication
      required: false
      type: string
    - description: Studies in this investigation
      items: Study
      name: studies
      required: false
      type: list
    - description: Persons associated with this investigation
      items: Person
      name: persons
      required: false
      type: list
  Study:
    description: A study comprises a series of assays (or measurements) of one or more types, undertaken to answer a particular
      biological question.
    fields:
    - description: Unique identifier comprising the name or identifier for the institution/database hosting the submission
        of the study data, and the identifier of the study in that institution.
      name: study_id
      required: false
      type: string
    - description: Human-readable text summarising the study
      name: study_title
      required: false
      type: string
    - description: Human-readable text describing the study
      name: study_description
      required: false
      type: string
    - description: Date when the experiment started
      name: study_start_date
      required: false
      type: date
    - description: Date when the experiment ended
      name: study_end_date
      required: false
      type: date
    - description: Name and address of the institution responsible for the study.
      name: institution
      required: false
      type: string
