    - name: provider_name
      type: string
      required: false
      description: Name of the strain provider
    - name: provider_id
      type: string
      required: false
      description: Provider's identifier for the strain
    - name: genotype
      type: string
      required: false
      description: Genotype description
    - name: phenotype
      type: string
      required: false
      description: Phenotype description
  Publication:
    ontology_term: jerm:Publication
    description: A scientific publication
    fields:
    - name: identifier
      type: string
      required: true
      description: A unique identifier
      ontology_term: jerm:identifier
    - name: title
      type: string
      required: true
      description: Title of the publication
      ontology_term: jerm:title
    - name: pubmed_id
      type: string
      required: false
      description: PubMed ID
      ontology_term: jerm:pubmed_id
    - name: doi
      type: string
      required: false
      description: Digital Object Identifier
      ontology_term: jerm:doi
    - name: authors
      type: list
      items: Person
      required: false
      description: Authors of the publication
    - name: author_list
      type: string
      required: false
      description: Comma-separated list of author names
    - name: journal
      type: string
      required: false
