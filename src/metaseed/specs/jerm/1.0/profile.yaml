    - name: publication_date
      type: date
      required: false
      description: Date of publication
    - name: abstract
      type: string
      required: false
      description: Publication abstract
    - name: citation
      type: string
      required: false
      description: Full citation text
    - name: url
      type: uri
      required: false
      description: URL to the publication
    - name: publication_type
      type: string
      required: false
      description: Type of publication (journal, conference, book, etc.)
  Person:
    ontology_term: jerm:Person
    description: A person or contact
    fields:
    - name: identifier
      type: string
      required: true
      description: A unique identifier for the person
      ontology_term: jerm:identifier
    - name: first_name
      type: string
      required: true
      description: First name
      ontology_term: jerm:first_name
    - name: last_name
      type: string
      required: true
      description: Last name
      ontology_term: jerm:last_name
    - name: email
      type: string
      required: false
      description: Email address
      ontology_term: jerm:email
    - name: orcid
      type: string
      required: false
      description: ORCID identifier
    - name: phone
      type: string
      required: false
      description: Phone number
    - name: affiliation
      type: string
      required: false
      description: Organization affiliation
      ontology_term: jerm:affiliation
    - name: institution_id
      type: string
      required: false
      parent_ref: Institution.title
      description: Reference to Institution
    - name: web_page
      type: uri
      required: false
      description: Personal website
    - name: roles
      type: list
      items: string
      required: false
      description: Roles in the project
  Document:
    ontology_term: jerm:Document
    description: A document associated with research (reports, specifications, etc.)
    fields:
    - name: identifier
      type: string
      required: true
      description: A unique identifier
      ontology_term: jerm:identifier
    - name: title
      type: string
      required: true
      description: Document title
      ontology_term: jerm:title
    - name: description
      type: string
      required: false
      description: Description of the document
      ontology_term: jerm:description
    - name: seek_id
      type: uri
      required: false
      description: The persistent SEEK identifier URL
    - name: filename
      type: string
      required: false
      description: Original filename
    - name: version
      type: integer
      required: false
      description: Version number
    - name: license
      type: string
      required: false
      description: License for the document
    - name: creators
      type: list
      items: Person
      required: false
      description: People who created this document
    - name: created_at
      type: date
      required: false
      description: Date the document was uploaded
  Presentation:
    ontology_term: jerm:Presentation
    description: A presentation (slides, poster, etc.)
    fields:
    - name: identifier
      type: string
      required: true
      description: A unique identifier
      ontology_term: jerm:identifier
    - name: title
      type: string
      required: true
      description: Presentation title
      ontology_term: jerm:title
    - name: description
      type: string
      required: false
      description: Description of the presentation
      ontology_term: jerm:description
    - name: seek_id
      type: uri
      required: false
      description: The persistent SEEK identifier URL
    - name: filename
      type: string
      required: false
      description: Original filename
    - name: event
      type: entity
      items: Event
      required: false
      description: Event where presented
    - name: version
      type: integer
      required: false
      description: Version number
    - name: license
      type: string
      required: false
      description: License for the presentation
    - name: creators
      type: list
      items: Person
      required: false
      description: People who created this presentation
    - name: created_at
      type: date
      required: false
      description: Date the presentation was uploaded
  Event:
    ontology_term: jerm:Event
    description: An event (conference, workshop, meeting)
    fields:
    - name: identifier
      type: string
      required: true
      description: A unique identifier
      ontology_term: jerm:identifier
    - name: title
      type: string
      required: true
      description: Event title
      ontology_term: jerm:title
    - name: description
